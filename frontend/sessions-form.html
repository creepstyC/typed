<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD sessions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" 
    crossorigin="anonymous">
    <style>
        .divider {
            height: 1px;
            background-color: rgba(0, 0, 0, .15);
        }
        .text-justify {
            text-align: justify;
        }
    </style>
</head>
<body>
    <section class="container">
        <div class="row align-items-center mb-4">
            <span class="fw-bold w-auto">Sessions Form</span>
        </div>
        <div class="divider"></div>
            <div class="row">
            <form  id="user-form" class="mt-4" action="" onsubmit="" method="POST">
                <input type="hidden" id="idsession"/>
                <div class="mb-3">
                    <label for="session-id" class="form-label">Id</label>
                    <input type="text" class="form-control" id="session-id" name="session-id" readonly>
                </div>
                <div class="mb-3">
                    <label for="session-textId" class="form-label">TextId</label>
                    <input type="number" class="form-control" id="session-textId" name="session-textId">
                </div>
                <div class="mb-3">
                    <label for="session-name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="session-name" name="session-name">
                </div>
                <div class="mb-3">
                    <label for="session-time" class="form-label">Time</label>
                    <input type="number" class="form-control" id="session-time" name="session-time">
                </div>
                <div class="mb-3">
                    <label for="session-words" class="form-label">Words</label>
                    <input type="number" class="form-control" id="session-words" name="session-words">
                </div>
                <button type="button" class="btn btn-primary" onclick="saveSession()">Save</button>
                <button type="button" class="btn btn-danger" onclick="deleteSession()">Delete</button>
            </form>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" 
    crossorigin="anonymous"></script>
    <script src="js/request.js"></script>
    <script src="js/sessions.js"></script>
    <script>
        window.onload = function(){
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('idsession') != null)
                loadSession(urlParams.get('idsession'))
        }
    </script>
</body>
</html>
